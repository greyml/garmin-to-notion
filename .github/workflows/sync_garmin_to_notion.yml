name: Sync Garmin to Notion

on:
  schedule:
    - cron: '0 1 * * *' # Daily
  workflow_dispatch:
    inputs:
      GARMIN_ACTIVITIES_FETCH_LIMIT:
        type: number
        default: 10
env:
  TZ: 'America/Toronto'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install dependencies
        run: uv sync

      - name: Run script
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          GARMIN_AUTH_TOKEN: ${{ secrets.GARMIN_AUTH_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          NOTION_STRENGTH_DB_ID: ${{ secrets.NOTION_STRENGTH_DB_ID }}
          NOTION_WEIGHT_DB_ID: ${{ secrets.NOTION_WEIGHT_DB_ID }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ inputs.GARMIN_ACTIVITIES_FETCH_LIMIT || '40' }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          TZ: 'America/Toronto'
        run: |
          TOKEN=$(uv run python scripts/generate_tokens.py)
          gh secret set GARMIN_AUTH_TOKEN --body "$TOKEN" --repo ${{ github.repository }}
          uv run python -m src.workflows.garmin-activities
          uv run python -m src.workflows.personal-records
          uv run python -m src.workflows.daily-steps
          uv run python -m src.workflows.sleep-data
          uv run python -m src.workflows.strength-tracking
          uv run python -m src.workflows.weight-tracking

